<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    
    <style>
        body {
            background-color: #f3f7f4;
          display: flex;
          justify-content: center;
          margin-top: 50px;
          font-family: Arial, sans-serif;
        }
      
        table {
            width: 80%;
    margin: auto;

    border: 2px solid #3498db;
    border-radius: 20px;

    overflow: hidden;

    box-shadow:
        0 5px 15px rgba(0,0,0,.2);

    transition: .3s;
          
        }
      
        th, td {
  
            
          padding: 12px 16px;
          border-bottom: 1px solid #ddd;
          text-align: left;
        }
      
        th {
          background: #f5f5f5;
        }
      
        tr:hover {
          background: #d3e7da;
          cursor: pointer;
        }

        tr {
            transition: 0.3s;
        }

        img {
            width: 45px;
            height: 30px;

        
        }
      </style>

    <table>
        <tr>
            <th>Bandeira</th>
            <th>Seleção</th>
            <th>Classificação</th>
        </tr>

        <tr>
            <td><img src="BRASIL.jpg" alt=""></td>
            <td>Brasil</td>
            <td>1º</td>
        </tr>

        <tr>
            <td><img src="Marrocos.png" alt=""></td>
            <td>Marrocos</td>
            <td>2º</td>
        </tr>

        <tr>
            <td><img src="Flag_of_Haiti.png" alt=""></td>
            <td>Haiti</td>
            <td>3º</td>
        </tr>
        <tr>
            <td><img src="Flag_of_Scotland.png" alt=""></td>
            <td>Escócia</td>
            <td>4º</td>
        </tr>


    </table>
    
</body>
</html>
